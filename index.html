<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #1e1e1e;
      --fg:    #e8e4dc;
      --mid:   #5a5a5a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.055;
      mix-blend-mode: luminosity;
      animation: grain 0.18s steps(1) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3px, 2px); }
      50%  { transform: translate(2px, -3px); }
      75%  { transform: translate(-1px, 4px); }
      100% { transform: translate(3px, -1px); }
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 99;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10,10,10,0.65) 100%);
    }

    /* layout */
    .page {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    /* top label */
    .label-top {
      position: fixed;
      top: clamp(20px, 4vw, 36px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: clamp(8px, 1vw, 10px);
      letter-spacing: 0.35em;
      color: var(--fg);
      opacity: 0.2;
      white-space: nowrap;
      z-index: 2;
    }

    /* bottom label */
    .label-bottom {
      position: fixed;
      bottom: clamp(20px, 4vw, 36px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-style: italic;
      font-size: clamp(8px, 1vw, 10px);
      letter-spacing: 0.25em;
      color: var(--fg);
      opacity: 0.18;
      white-space: nowrap;
      z-index: 2;
    }

    /* side labels */
    .label-left, .label-right {
      position: fixed;
      top: 50%;
      font-family: 'Space Mono', monospace;
      font-size: clamp(7px, 0.8vw, 9px);
      letter-spacing: 0.3em;
      color: var(--fg);
      opacity: 0.15;
      writing-mode: vertical-rl;
      z-index: 2;
    }
    .label-left  { left: clamp(16px, 3vw, 32px);  transform: translateY(-50%) rotate(180deg); }
    .label-right { right: clamp(16px, 3vw, 32px); transform: translateY(-50%); }

    /* center */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2.5vw, 22px);
      text-align: center;
      padding: 0 20px;
      animation: appear 1.6s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(68px, 17vw, 230px);
      line-height: 0.9;
      letter-spacing: 0.01em;
      color: var(--fg);
    }

    .rule {
      width: clamp(60px, 14vw, 160px);
      height: 1px;
      background: var(--fg);
      opacity: 0.2;
    }

    .sub {
      font-family: 'Space Mono', monospace;
      font-style: italic;
      font-size: clamp(9px, 1.2vw, 12px);
      letter-spacing: 0.3em;
      color: var(--fg);
      opacity: 0.3;
    }
  </style>
</head>
<body>

  
  <div class="label-right">2026</div>

  <main class="page">
    <div class="center">
      <h1 class="headline">UNDER<br>CONSTRUCTION</h1>
    </div>
  </main>

</body>
</html>
