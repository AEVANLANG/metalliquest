      content: '';

      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, var(--scanline) 3px, var(--scanline) 4px);

  /* === IMPROVED LAST.FM SCRIPT === */
  const LASTFM_USER = "phil10089";
  const LASTFM_API_KEY = "9f634a123fb3900e4871c4e642fe82bf";

  async function fetchNowPlaying() {
    try {
      const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USER}&api_key=${LASTFM_API_KEY}&format=json&limit=2`);
      const data = await res.json();
      const track = data.recenttracks?.track?.[0];
      if (!track) return;

      const isNowPlaying = track["@attr"]?.nowplaying === "true";
      const artEl = document.getElementById('np-art');
      const trackEl = document.getElementById('np-track');
      const artistEl = document.getElementById('np-artist');
      const progressContainer = document.getElementById('np-progress-container');

      if (isNowPlaying) {
        artEl.innerHTML = track.image[3]['#text'] ? `<img src="${track.image[3]['#text']}" style="width:100%;height:100%;object-fit:cover;" alt="album art">` : '💀';
        trackEl.textContent = track.name.toUpperCase();
        artistEl.textContent = track.artist["#text"].toUpperCase();
        progressContainer.style.display = "block";
        simulateProgress();
      } else {
        // Last played
        artEl.innerHTML = track.image[3]['#text'] ? `<img src="${track.image[3]['#text']}" style="width:100%;height:100%;object-fit:cover;" alt="album art">` : '💀';
        trackEl.textContent = track.name.toUpperCase();
        artistEl.textContent = (track.artist["#text"].toUpperCase()) + " — LAST PLAYED";
        progressContainer.style.display = "none";
      }
    } catch(e) {
      console.log("Last.fm fetch failed");
    }
  }

  function simulateProgress() {
    const progress = document.getElementById('np-progress');
    const elapsedEl = document.getElementById('np-time-elapsed');
    let elapsed = 0;
    const duration = 240; // 4 minutes average

    progress.style.width = "0%";

    const interval = setInterval(() => {
      elapsed += 3;
      const percent = Math.min((elapsed / duration) * 100, 100);
      progress.style.width = percent + "%";
      elapsedEl.textContent = `${Math.floor(elapsed/60)}:${(elapsed%60).toString().padStart(2,'0')}`;
      if (percent >= 100) clearInterval(interval);
    }, 900);
  }

  // Initial fetch + poll every 20 seconds
  fetchNowPlaying();
  setInterval(fetchNowPlaying, 20000);
</script>
